<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الكتاب التفاعلي - الرياضيات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        body { font-family: 'Cairo', sans-serif; }
        
        .toc-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .page { display: none; }
        .page.active { display: block; }
        .option-btn {
            transition: all 0.2s;
        }
        .option-btn.correct {
            background-color: #d1fae5 !important;
            border-color: #10b981 !important;
            color: #065f46;
        }
        .option-btn.wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">

    <!-- صفحة جدول المحتويات -->
    <div id="toc-page" class="page active min-h-screen">
        <div class="max-w-6xl mx-auto px-6 py-8">
            <div class="flex items-center justify-between mb-10">
                <div>
                    <h1 class="text-4xl font-bold text-indigo-800">المحتويات</h1>
                    <p class="text-gray-600 mt-2">اضغط على الوحدة للدخول إلى الأسئلة</p>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-xl p-8 mb-12">
                <img src="/home/workdir/attachments/image.jpeg" alt="جدول المحتويات" class="mx-auto rounded-xl shadow-lg w-full max-w-4xl">
            </div>

            <h2 class="text-2xl font-bold text-center mb-8 text-gray-800">الوحدات الدراسية</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="units-list"></div>
        </div>
    </div>

    <!-- صفحة الأسئلة -->
    <div id="questions-page" class="page min-h-screen bg-white">
        <div class="max-w-4xl mx-auto px-6 py-8">
            <button onclick="backToTOC()" class="flex items-center gap-2 text-indigo-600 hover:text-indigo-700 mb-6 font-medium">
                <i class="fas fa-arrow-right"></i> العودة إلى جدول المحتويات
            </button>
            
            <h1 id="unit-title" class="text-3xl font-bold text-gray-800 mb-8"></h1>
            <div id="questions-container" class="space-y-10"></div>
        </div>
    </div>

    <script>
        const units = [
            {
                id: 1,
                title: "الوحدة الأولى: القياس الدائري",
                page: "13-23",
                color: "emerald",
                questions: [
                    // الأسئلة الجديدة من الصورة
                    {
                        q: "محيط القطاع الدائري الذي طول قوسه 4 سم وطول قطر دائرته 10 سم يساوي ...... سم",
                        options: ["10", "30", "20", "14"],
                        answer: 2
                    },
                    {
                        q: "مساحة القطاع الدائري الذي طول نصف قطر دائرته 4 سم وطول قوسه 6 سم تساوي ...... سم²",
                        options: ["8", "10", "12", "24"],
                        answer: 2
                    },
                    {
                        q: "مساحة القطاع الدائري الذي طول قوسه 10 سم وطول قطر دائرته 10 سم تساوي ...... سم²",
                        options: ["100", "120", "25", "50"],
                        answer: 1
                    },
                    {
                        q: "مساحة القطاع الدائري الذي قياس زاويته 120° وطول نصف قطر دائرته 4 سم تساوي ...... سم²",
                        options: ["19.6", "12.8", "9.6", "4.8"],
                        answer: 2
                    }
                ]
            },
            {
                id: 2,
                title: "الوحدة الثالثة: مقدمة في النهايات والاتصال",
                page: "59-82",
                color: "indigo",
                questions: [
                    { q: "ما هو تعريف النهاية للدالة f(x) عند x = a؟", options: ["lim f(x) = L", "f(a) = L", "f'(a) = L"], answer: 0 }
                ]
            }
        ];

        function renderUnits() {
            const container = document.getElementById('units-list');
            container.innerHTML = '';
            
            units.forEach(unit => {
                const card = document.createElement('div');
                card.className = `toc-card bg-white rounded-2xl shadow-lg p-6 cursor-pointer border border-transparent hover:border-${unit.color}-300`;
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="px-3 py-1 text-xs font-medium bg-${unit.color}-100 text-${unit.color}-700 rounded-full">وحدة ${unit.id}</span>
                            <h3 class="mt-4 text-xl font-semibold text-gray-800">${unit.title}</h3>
                            <p class="text-sm text-gray-500 mt-2">صفحة ${unit.page}</p>
                        </div>
                        <i class="fas fa-arrow-left text-3xl text-${unit.color}-200"></i>
                    </div>
                `;
                card.onclick = () => showQuestions(unit);
                container.appendChild(card);
            });
        }

        function showQuestions(unit) {
            document.getElementById('toc-page').classList.remove('active');
            document.getElementById('questions-page').classList.add('active');
            document.getElementById('unit-title').textContent = unit.title;

            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            unit.questions.forEach((q, index) => {
                const div = document.createElement('div');
                div.className = "bg-white border border-gray-200 rounded-2xl p-6 shadow";
                div.innerHTML = `
                    <p class="text-lg font-medium mb-6">${index + 1}. ${q.q}</p>
                    <div class="grid grid-cols-1 gap-3" id="q-options-${index}"></div>
                `;
                container.appendChild(div);

                const optionsDiv = document.getElementById(`q-options-${index}`);
                q.options.forEach((option, i) => {
                    const btn = document.createElement('button');
                    btn.className = `option-btn w-full text-right p-4 rounded-xl border border-gray-300 hover:border-indigo-400 text-lg`;
                    btn.textContent = option;
                    btn.onclick = () => checkAnswer(btn, i, q.answer, index);
                    optionsDiv.appendChild(btn);
                });
            });
        }

        function checkAnswer(btn, selected, correct, questionIndex) {
            const options = btn.parentElement.children;
            for (let b of options) {
                b.disabled = true;
                if (parseInt(b.textContent) === correct || b.textContent === correct.toString()) {
                    b.classList.add('correct');
                }
            }
            if (selected !== correct) {
                btn.classList.add('wrong');
            }
        }

        function backToTOC() {
            document.getElementById('questions-page').classList.remove('active');
            document.getElementById('toc-page').classList.add('active');
        }

        window.onload = renderUnits;
    </script>
</body>
</html>
